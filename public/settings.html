<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings – Aspira</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="bg-pattern"></div>
    <nav class="navbar">
        <div class="navbar-brand">
            <div style="width:32px;height:32px" id="nav-logo"></div>Aspira
        </div>
        <div class="navbar-actions">
            <a href="/dashboard" class="btn btn-ghost btn-sm">← Dashboard</a>
            <span class="nav-user-name" id="nav-name"></span>
            <div class="nav-avatar" id="nav-avatar"></div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container" style="max-width: 600px;">
            <div style="margin-bottom: 2rem;">
                <h1>Settings</h1>
                <p>Manage your profile and account preferences</p>
            </div>

            <div class="card">
                <h3>Profile Information</h3>
                <form id="profileForm" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Target Industry</label>
                        <select id="industry">
                            <option value="software">Software Engineering</option>
                            <option value="marketing">Marketing</option>
                            <option value="design">Product Design</option>
                            <option value="finance">Finance</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Experience level</label>
                        <select id="experience">
                            <option value="junior">Junior (0-2 years)</option>
                            <option value="mid">Mid-level (2-5 years)</option>
                            <option value="senior">Senior (5+ years)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Update Profile</button>
                </form>
            </div>

            <div class="card" style="margin-top: 1.5rem; border-color: var(--accent-red-faint);">
                <h3 style="color: var(--accent-red)">Danger Zone</h3>
                <p class="text-muted text-sm">Deleting your account is permanent and cannot be undone.</p>
                <button class="btn btn-ghost btn-sm" style="color: var(--accent-red); margin-top: 1rem;"
                    onclick="deleteAccount()">Delete Account</button>
            </div>
        </div>
    </main>

    <script src="/js/shared.js"></script>
    <script>
        document.getElementById('nav-logo').innerHTML = LOGO_SVG;
        let currentUser;

        (async () => {
            currentUser = await checkAuth('/sign-in');
            buildNav(currentUser);
            if (currentUser) {
                document.getElementById('name').value = currentUser.name;
                document.getElementById('industry').value = currentUser.industry || 'software';
                document.getElementById('experience').value = currentUser.experience || 'junior';
            }
        })();

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                industry: document.getElementById('industry').value,
                experience: document.getElementById('experience').value
            };
            try {
                // Shared API mock or real endpoint
                await api('/api/auth/me', 'PUT', data);
                toast('Profile updated successfully');
                // Refresh local session storage or similar if needed
                setTimeout(() => window.location.reload(), 1500);
            } catch (e) {
                toast('Failed to update profile');
            }
        });

        async function deleteAccount() {
            if (!confirm('Are you ABSOLUTELY sure? This will delete all your data.')) return;
            try {
                await api('/api/auth/me', 'DELETE');
                window.location.href = '/';
            } catch (e) {
                toast('Failed to delete account');
            }
        }
    </script>
</body>

</html>
