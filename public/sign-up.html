<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Aspira</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <!-- Grid background -->
    <div
        style="position:fixed;inset:0;z-index:-1;background:var(--bg-primary);background-image:radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);background-size:40px 40px;">
    </div>
    <!-- Corner decorations -->
    <div
        style="position:fixed;top:1.5rem;left:1.5rem;font-size:1.5rem;color:rgba(255,255,255,0.15);font-weight:300;z-index:0;">
        +</div>
    <div
        style="position:fixed;top:1.5rem;right:1.5rem;font-size:1.5rem;color:rgba(255,255,255,0.15);font-weight:300;z-index:0;">
        +</div>
    <div
        style="position:fixed;bottom:1.5rem;left:1.5rem;font-size:1.5rem;color:rgba(255,255,255,0.15);font-weight:300;z-index:0;">
        +</div>
    <div
        style="position:fixed;bottom:1.5rem;right:1.5rem;font-size:1.5rem;color:rgba(255,255,255,0.15);font-weight:300;z-index:0;">
        +</div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div style="width:36px;height:36px;" id="auth-logo"></div>
                <span class="auth-logo-label">Aspira</span>
            </div>
            <h1 class="auth-title">Create an Account</h1>
            <p class="auth-subtitle">Smart Interview Preparation with AI</p>

            <form class="auth-form" id="signup-form" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="new-password"
                        required>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg mt-2" id="signup-btn">Create an
                    Account</button>
            </form>

            <div class="auth-divider">or</div>

            <a href="/api/auth/google" class="social-btn w-full" id="google-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="width:18px;height:18px">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
                </svg>
                Continue with Google
            </a>
            <a href="/api/auth/github" class="social-btn w-full mt-2" id="github-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:18px;height:18px;fill:white">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
                Continue with GitHub
            </a>

            <div class="auth-footer">
                Already have an account? <a href="/sign-in">Sign In</a>
            </div>
        </div>
    </div>

    <script src="/js/shared.js"></script>
    <script>
        document.getElementById('auth-logo').innerHTML = LOGO_SVG;

        (async () => {
            const user = await checkAuthNoRedirect();
            if (user) window.location.href = '/dashboard';

            // Fixed: Set absolute URLs for OAuth buttons to target Render backend
            document.getElementById('google-btn').href = API_BASE_URL + '/api/auth/google';
            document.getElementById('github-btn').href = API_BASE_URL + '/api/auth/github';
        })();

        // Show OAuth error messages
        const urlParams = new URLSearchParams(window.location.search);
        const oauthError = urlParams.get('error');
        if (oauthError === 'google_not_configured') showToast('Google login not configured yet', 'error');
        if (oauthError === 'github_not_configured') showToast('GitHub login not configured yet', 'error');
        if (oauthError === 'google_failed') showToast('Google sign-up failed. Please try again.', 'error');
        if (oauthError === 'github_failed') showToast('GitHub sign-up failed. Please try again.', 'error');
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email || !password) return showToast('Please fill all fields', 'error');
            if (password.length < 6) return showToast('Password must be at least 6 characters', 'error');

            setLoading(btn, true);
            try {
                await api('/api/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify({ name, email, password })
                });
                showToast('Account created! Redirecting...', 'success');
                setTimeout(() => { window.location.href = '/onboarding'; }, 1000);
            } catch (err) {
                showToast(err.message, 'error');
                setLoading(btn, false, 'Create an Account');
            }
        });
    </script>
</body>

</html>
