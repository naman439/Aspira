<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback – Aspira</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { color: white !important; }

        /* Page title */
        h1 { color: white !important; font-size: 36px; margin-bottom: 6px; }
        p { color: rgba(255,255,255,0.65) !important; }

        /* Main container */
        .container-md { max-width: 820px; margin: 0 auto; }

        /* ── Score header card ── */
        .feedback-header {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 2.25rem 2.5rem;
            display: flex;
            align-items: center;
            gap: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--glass-inner-light), var(--glass-shadow);
        }

        /* Score circle */
        .score-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.85);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .score { font-size: 2.4rem; font-weight: 800; line-height: 1; }
        .score-label { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

        .feedback-header h2 { color: white !important; font-size: 26px; margin-bottom: 8px; font-weight: 800; }
        
        /* ── Category score cards ── */
        .category-score-card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: var(--radius-md);
            padding: 1.75rem 1.25rem;
            text-align: center;
            box-shadow: var(--glass-inner-light), 0 8px 32px rgba(0,0,0,0.35);
            transition: var(--transition);
        }

        .category-score-card:hover { 
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.45);
            background: var(--bg-card-hover);
        }

        .cat-score { font-size: 2.4rem; font-weight: 800; margin-bottom: 8px; }
        .cat-label { font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: capitalize; margin-bottom: 12px; }

        .progress-bar-wrapper { margin-top: 10px; }
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .progress-fill { height: 100%; border-radius: 99px; transition: width 1s ease-out; }

        /* ── Strengths / Improvements cards ── */
        .card, .card-hover-glow {
            background: var(--bg-card) !important;
            backdrop-filter: var(--glass-blur) !important;
            -webkit-backdrop-filter: var(--glass-blur) !important;
            border: var(--glass-border) !important;
            border-radius: var(--radius-lg) !important;
            padding: 2rem !important;
            box-shadow: var(--glass-inner-light), var(--glass-shadow) !important;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.5) !important;
        }

        .card h3 { color: white !important; font-weight: 800; }

        /* List items text refinement */
        li { color: rgba(255,255,255,0.92) !important; font-weight: 500; }

        /* Action buttons row */
        .btn-secondary {
            background: rgba(255,255,255,0.08) !important;
            border: 1.5px solid rgba(255,255,255,0.25) !important;
            color: white !important;
            border-radius: 12px !important;
        }

        .btn-ghost {
            border: 1.5px solid rgba(255,255,255,0.2) !important;
            color: rgba(255,255,255,0.8) !important;
            border-radius: 12px !important;
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.08) !important;
            color: white !important;
        }
    </style>
</head>

<body>
    <script src="https://unpkg.com/lucide@latest"></script>
    <div class="video-bg-container">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="https://videos.pexels.com/video-files/18069232/18069232-hd_1920_1080_24fps.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>
    <nav class="navbar">
        <div class="navbar-brand">
            <div style="width:32px;height:32px" id="nav-logo"></div>Aspira
        </div>
        <div class="navbar-actions">
            <a href="/interview" class="btn btn-ghost btn-sm">New Interview</a>
            <a href="/dashboard" class="btn btn-secondary btn-sm">Dashboard</a>
            <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign Out</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container-md" style="padding:2rem 1.5rem;">
            <h1 class="mb-2">Interview Feedback</h1>
            <p class="mb-6">Here's your detailed performance analysis</p>
            <div id="feedback-content">
                <div style="text-align:center;padding:4rem;"><span class="spinner"
                        style="width:40px;height:40px;border-width:3px;"></span>
                    <p class="mt-4">Analyzing your interview...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/shared.js"></script>
    <script>
        document.getElementById('nav-logo').innerHTML = LOGO_SVG;

        (async () => {
            await checkAuth('/sign-in');
            const feedback = JSON.parse(sessionStorage.getItem('feedback') || 'null');
            const content = document.getElementById('feedback-content');

            if (!feedback) {
                content.innerHTML = `<div class="card text-center"><h3>No feedback available</h3><p class="mt-2">Complete an interview first to see your results.</p><a href="/interview" class="btn btn-primary mt-4">Start Interview</a></div>`;
                return;
            }

            const scoreColor = feedback.score >= 80 ? '#22c55e' : feedback.score >= 60 ? '#f59e0b' : '#ef4444';

            content.innerHTML = `
        <div class="feedback-header">
          <div class="score-circle" style="border-color:${scoreColor};box-shadow:0 0 30px ${scoreColor}33">
            <div class="score" style="color:${scoreColor}">${feedback.score}</div>
            <div class="score-label">/ 100</div>
          </div>
          <div>
            <h2 class="gradient-text">${feedback.score >= 80 ? '🎉 Excellent Performance' : feedback.score >= 60 ? 'Strong Performance' : 'Keep Practicing'}</h2>
            <p class="mt-2 text-muted">${feedback.overallFeedback}</p>
          </div>
        </div>

        <div class="category-scores">
          ${Object.entries(feedback.categoryScores || { communication: 0, technical: 0, problemSolving: 0 }).map(([key, val]) => {
                const iconMap = { communication: 'message-circle', technical: 'code', problemSolving: 'brain' };
                return `
                <div class="category-score-card">
                  <div class="cat-score" style="color:${val >= 80 ? '#22c55e' : val >= 60 ? '#f59e0b' : '#ef4444'}">${val}</div>
                  <div class="cat-label"><i data-lucide="${iconMap[key] || 'circle'}" style="width: 14px; vertical-align: middle; margin-right: 4px;"></i> ${key.replace(/([A-Z])/g, ' $1').trim()}</div>
                  <div class="progress-bar-wrapper">
                    <div class="progress-bar"><div class="progress-fill" style="width:${val}%;background:${val >= 80 ? '#22c55e' : val >= 60 ? 'linear-gradient(90deg,#f59e0b,#f97316)' : '#ef4444'}"></div></div>
                  </div>
                </div>
                `;
            }).join('')}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem;">
          <div class="card card-hover-glow">
            <h3 class="mb-3" style="color:#4ade80; display: flex; align-items: center; gap: 8px;"><i data-lucide="check-circle" style="width: 20px;"></i> Strengths</h3>
            <ul style="list-style:none;display:flex;flex-direction:column;gap:10px">
              ${(feedback.strengths || []).map(s => `<li style="display:flex;gap:10px;font-size:0.9rem; color: #94a3b8;"><i data-lucide="check" style="width: 14px; color: #4ade80; flex-shrink: 0; margin-top: 2px;"></i>${s}</li>`).join('')}
            </ul>
          </div>
          <div class="card card-hover-glow">
            <h3 class="mb-3" style="color:#f59e0b; display: flex; align-items: center; gap: 8px;"><i data-lucide="trending-up" style="width: 20px;"></i> Areas to Improve</h3>
            <ul style="list-style:none;display:flex;flex-direction:column;gap:10px">
              ${(feedback.improvements || []).map(i => `<li style="display:flex;gap:10px;font-size:0.9rem; color: #94a3b8;"><i data-lucide="arrow-right" style="width: 14px; color: #f59e0b; flex-shrink: 0; margin-top: 2px;"></i>${i}</li>`).join('')}
            </ul>
          </div>
        </div>

        <div style="display:flex;gap:1rem;justify-content:center; margin-bottom: 3rem;">
          <a href="/interview" class="btn btn-primary btn-lg">Try Again</a>
          <a href="/analytics" class="btn btn-secondary btn-lg">View Analytics</a>
          <a href="/dashboard" class="btn btn-ghost btn-lg">Dashboard</a>
        </div>`;

            buildFooter();
            initIcons();
            sessionStorage.removeItem('feedback');
        })();
    </script>
</body>

</html>
