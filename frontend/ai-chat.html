<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Coach – Aspira</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <script src="https://unpkg.com/lucide@latest"></script>
    <div class="video-bg-container">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="https://videos.pexels.com/video-files/18069232/18069232-hd_1920_1080_24fps.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>
    <nav class="navbar">
        <div class="navbar-brand">
            <div style="width:32px;height:32px" id="nav-logo"></div>Aspira
        </div>
        <div class="navbar-actions">
            <a href="/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
            <span class="nav-user-name" id="nav-name"></span>
            <div class="nav-avatar" id="nav-avatar"></div>
            <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign Out</button>
        </div>
    </nav>

    <main class="main-content" style="height:100vh;overflow:hidden;">
        <div class="chat-layout">
            <!-- Sidebar -->
            <aside class="chat-sidebar">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem; padding: 0 8px;">
                    <h3><i data-lucide="messages-square" style="width: 18px; vertical-align: middle; margin-right: 4px;"></i> Chats</h3>
                    <button class="btn btn-primary btn-sm" onclick="newChat()" style="display: flex; align-items: center; gap: 4px;"><i data-lucide="plus" style="width: 14px;"></i> New</button>
                </div>
                <div class="chat-list" id="chat-list">
                    <p class="text-muted text-xs" style="padding:8px;">Loading chats...</p>
                </div>
            </aside>

            <!-- Main chat area -->
            <div class="chat-main">
                <div class="chat-messages" id="chat-messages">
                    <!-- Welcome state -->
                    <div id="welcome-msg" style="text-align:center;padding:4rem 2rem;">
                        <div style="margin-bottom:1.5rem; color: var(--accent-blue);"><i data-lucide="bot" style="width: 64px; height: 64px;"></i></div>
                        <h2 class="gradient-text">AI Career Coach</h2>
                        <p style="max-width:400px;margin:0.75rem auto 2rem;">I'm your AI-powered career coach. Ask me
                            anything about interviews, resumes, salary negotiation, or career growth.</p>
                        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
                            <button class="btn btn-secondary btn-sm" onclick="sendSuggestion(this)"><i data-lucide="dollar-sign" style="width: 14px; margin-right: 4px;"></i> How do I negotiate salary?</button>
                            <button class="btn btn-secondary btn-sm" onclick="sendSuggestion(this)"><i data-lucide="file-text" style="width: 14px; margin-right: 4px;"></i> Review my interview answers</button>
                            <button class="btn btn-secondary btn-sm" onclick="sendSuggestion(this)"><i data-lucide="code" style="width: 14px; margin-right: 4px;"></i> Tips for technical interviews</button>
                            <button class="btn btn-secondary btn-sm" onclick="sendSuggestion(this)"><i data-lucide="pencil" style="width: 14px; margin-right: 4px;"></i> How to write a great resume?</button>
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <textarea id="chat-input" placeholder="Ask me anything about your career..." rows="1"
                            onkeydown="handleKey(event)"></textarea>
                        <button class="chat-send-btn" onclick="sendMessage()" id="send-btn" title="Send Message">
                            <i data-lucide="send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        body { background: transparent !important; color: white !important; overflow: hidden; }
        .chat-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            margin: 20px;
            border-radius: var(--radius-xl);
            height: calc(100vh - 120px);
            overflow: hidden;
            box-shadow: var(--glass-inner-light), var(--glass-shadow);
        }
        .chat-sidebar {
            background: rgba(255, 255, 255, 0.03);
            border-right: var(--glass-border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .chat-main { 
            display: flex;
            flex-direction: column;
            height: 100%;
            background: transparent; 
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scrollbar-width: thin;
        }
        .chat-input-area {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border-top: var(--glass-border);
            padding: 1.25rem 2rem;
        }
        .chat-input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }
        #chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05) !important;
            border: var(--glass-border) !important;
            color: white !important;
            border-radius: 16px;
            padding: 14px 20px;
            padding-right: 50px;
            box-shadow: var(--glass-inner-light);
            transition: var(--transition);
            font-size: 0.95rem;
            resize: none;
            max-height: 200px;
        }
        #chat-input:focus {
            background: rgba(255, 255, 255, 0.08) !important;
            outline: none;
            border-color: rgba(59, 130, 246, 0.5) !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .chat-send-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .chat-send-btn:hover:not(:disabled) {
            transform: scale(1.05) translateY(-2px);
            background: #2563eb;
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.5);
        }
        .chat-send-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            box-shadow: none;
        }
        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin: 4px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .chat-item.active {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }
        .chat-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }
        .chat-item .delete-chat {
            opacity: 0;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.4);
        }
        .chat-item:hover .delete-chat {
            opacity: 1;
        }
        .chat-item .delete-chat:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .message-bot {
            background: rgba(15, 23, 42, 0.8) !important;
            border: var(--glass-border) !important;
            color: white !important;
            box-shadow: var(--glass-inner-light);
        }
        .message-user {
            background: var(--accent-blue) !important;
            color: white !important;
            border: var(--glass-border) !important;
            box-shadow: var(--glass-inner-light), 0 4px 15px rgba(59, 130, 246, 0.2);
        }
    </style>
    <script src="/js/shared.js"></script>
    <script>
        document.getElementById('nav-logo').innerHTML = LOGO_SVG;
        let currentChatId = null;
        let userInfo = null;

        (async () => {
            userInfo = await checkAuth('/sign-in');
            buildNav(userInfo);
            buildFooter();
            loadChatList();
            initIcons();
        })();

        async function loadChatList() {
            try {
                const data = await api('/api/chat/history');
                const list = document.getElementById('chat-list');
                if (data.chats.length === 0) {
                    list.innerHTML = '<p class="text-muted text-xs" style="padding:8px;">No chats yet. Start a conversation!</p>';
                } else {
                    list.innerHTML = data.chats.map(c => `
            <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" onclick="loadChat('${c.id}')">
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;" title="${c.title}">${c.title || 'New Chat'}</span>
                <i data-lucide="trash-2" class="delete-chat" onclick="event.stopPropagation(); deleteChat('${c.id}')"></i>
            </div>
          `).join('');
                }
            } catch (e) { }
        }

        async function loadChat(chatId) {
            currentChatId = chatId;
            document.getElementById('welcome-msg')?.remove();
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.chat-item[onclick*="${chatId}"]`)?.classList.add('active');

            const msgs = document.getElementById('chat-messages');
            msgs.innerHTML = '<div style="text-align:center;padding:2rem;"><span class="spinner"></span></div>';

            try {
                const data = await api(`/api/chat/${chatId}`);
                msgs.innerHTML = '';
                data.messages.forEach(m => appendMessage(m.role, m.content, false));
                msgs.scrollTop = msgs.scrollHeight;
                loadChatList(); // Refresh active state in sidebar
                initIcons();
            } catch (e) { msgs.innerHTML = '<p class="text-muted text-center">Failed to load chat</p>'; }
        }

        async function deleteChat(chatId) {
            if (!confirm('Are you sure you want to delete this chat?')) return;
            try {
                await api(`/api/chat/${chatId}`, { method: 'DELETE' });
                if (currentChatId === chatId) newChat();
                else loadChatList();
            } catch (e) { showToast('Failed to delete chat', 'error'); }
        }

        function newChat() {
            currentChatId = null;
            const msgs = document.getElementById('chat-messages');
            msgs.innerHTML = `<div id="welcome-msg" style="text-align:center;padding:4rem 2rem;">
        <div style="margin-bottom:1.5rem; color: var(--accent-blue);"><i data-lucide="bot" style="width: 64px; height: 64px;"></i></div>
        <h2 class="gradient-text">AI Career Coach</h2>
        <p style="max-width:400px;margin:0.75rem auto 2rem;">Ask me anything about interviews, resumes, salary negotiation, or career growth.</p>
      </div>`;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            document.getElementById('chat-input').focus();
            initIcons();
        }

        function sendSuggestion(btn) { document.getElementById('chat-input').value = btn.textContent; sendMessage(); }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            input.style.height = 'auto';

            document.getElementById('welcome-msg')?.remove();
            appendMessage('user', msg);

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;

            const aiMsgDiv = appendMessage('assistant', '', false, true);
            const bubble = aiMsgDiv.querySelector('.msg-bubble');
            let aiText = '';

            try {
                const response = await fetch(API_BASE_URL + '/api/chat/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ message: msg, chatId: currentChatId })
                });

                if (!response.ok) throw new Error('Failed to connect');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                let streamDone = false;
                while (!streamDone) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const content = line.substring(6).trim();
                            if (content === '[DONE]') {
                                streamDone = true;
                                break;
                            }
                            try {
                                const data = JSON.parse(content);
                                if (data.chatId) currentChatId = data.chatId;
                                if (data.text) {
                                    aiText += data.text;
                                    bubble.innerHTML = markdownToHtml(aiText);
                                    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                                }
                                if (data.error) throw new Error(data.error);
                            } catch (e) { }
                        }
                    }
                }
                loadChatList();
            } catch (e) {
                bubble.innerHTML = `<em style="color:var(--danger)">Error: ${e.message}</em>`;
            } finally {
                sendBtn.disabled = false;
                initIcons();
            }
        }

        function appendMessage(role, content, scroll = true, isTyping = false) {
            const msgs = document.getElementById('chat-messages');
            const isUser = role === 'user';
            const initial = isUser ? (userInfo?.name?.charAt(0) || 'U') : 'AI';

            const div = document.createElement('div');
            div.className = `chat-message ${isUser ? 'user' : 'ai'}`;
            div.innerHTML = `
        <div class="msg-avatar ${isUser ? 'user-av' : 'ai'}">${isUser ? initial.toUpperCase() : '<i data-lucide="bot" style="width: 18px; color: white;"></i>'}</div>
        <div class="msg-bubble">${isTyping ? '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span> Thinking...' : (isUser ? content : markdownToHtml(content))}</div>
      `;
            msgs.appendChild(div);
            if (scroll) msgs.scrollTop = msgs.scrollHeight;
            initIcons();
            return div;
        }

        // Auto-resize textarea
        document.getElementById('chat-input').addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>

</html>
