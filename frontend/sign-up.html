<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Aspira</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <script src="https://unpkg.com/lucide@latest"></script>
    <div class="video-bg-container">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="https://videos.pexels.com/video-files/18069232/18069232-hd_1920_1080_24fps.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div style="width:36px;height:36px;" id="auth-logo"></div>
                <span class="auth-logo-label">Aspira</span>
            </div>
            <h1 class="auth-title">Create an Account</h1>
            <p class="auth-subtitle">Smart Interview Preparation with AI</p>

            <form class="auth-form" id="signup-form" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password"
                            autocomplete="new-password" required>
                        <button type="button" class="password-toggle" id="toggle-password">
                            <i data-lucide="eye" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg mt-2" id="signup-btn">Create an
                    Account</button>
            </form>

            <div class="auth-divider">or</div>

            <a href="/api/auth/google" class="social-btn w-full" id="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="margin-right: 12px;">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84c.87-2.6 3.3-4.51 6.16-4.51z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>
            <a href="/api/auth/github" class="social-btn w-full mt-2" id="github-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#fff" style="margin-right: 12px;">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                Continue with GitHub
            </a>

            <div class="auth-footer">
                Already have an account? <a href="/sign-in">Sign In</a>
            </div>
        </div>
    </div>

    <script src="/js/shared.js"></script>
    <script>
        document.getElementById('auth-logo').innerHTML = LOGO_SVG;

        (async () => {
            const user = await checkAuthNoRedirect();
            if (user) window.location.href = '/dashboard';

            // Fixed: Set absolute URLs for OAuth buttons to target Render backend
            document.getElementById('google-btn').href = API_BASE_URL + '/api/auth/google';
            document.getElementById('github-btn').href = API_BASE_URL + '/api/auth/github';

            // Password Toggle Logic
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', () => {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    toggleBtn.innerHTML = isPassword 
                        ? `<i data-lucide="eye-off" style="width: 20px; height: 20px;"></i>`
                        : `<i data-lucide="eye" style="width: 20px; height: 20px;"></i>`;
                    initIcons();
                });
            }
            initIcons();
        })();

        // Show OAuth error messages
        const urlParams = new URLSearchParams(window.location.search);
        const oauthError = urlParams.get('error');
        if (oauthError === 'google_not_configured') showToast('Google login not configured yet', 'error');
        if (oauthError === 'github_not_configured') showToast('GitHub login not configured yet', 'error');
        if (oauthError === 'google_failed') showToast('Google sign-up failed. Please try again.', 'error');
        if (oauthError === 'github_failed') showToast('GitHub sign-up failed. Please try again.', 'error');
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email || !password) return showToast('Please fill all fields', 'error');
            if (password.length < 6) return showToast('Password must be at least 6 characters', 'error');

            setLoading(btn, true);
            try {
                await api('/api/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify({ name, email, password })
                });
                showToast('Account created! Redirecting...', 'success');
                setTimeout(() => { window.location.href = '/onboarding'; }, 1000);
            } catch (err) {
                showToast(err.message, 'error');
                setLoading(btn, false, 'Create an Account');
            }
        });
    </script>
</body>

</html>
